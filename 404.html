<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages 404 redirect for client-side routing
        // Redirect to index.html with the original path as a query parameter
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        
        // Redirect to index.html with the path preserved
        window.location.replace('/sprachinsel_schule/index.html?redirect=' + encodeURIComponent(path + search + hash));
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
